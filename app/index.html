<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestara Realty — Premium Homes in Pune | Luxury Villas, Penthouses & Apartments</title>
    <meta name="description" content="Nestara Realty is Pune's premier real estate advisory. We help families find premium villas, penthouses, and apartments in Koregaon Park, Baner, Kalyani Nagar, and Viman Nagar." />
    <meta name="keywords" content="Pune real estate, luxury homes Pune, villas Koregaon Park, premium apartments Baner, penthouses Pune, Nestara Realty" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nestara.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nestara Realty — Premium Homes in Pune" />
    <meta property="og:description" content="Pune's premier real estate advisory. Find luxury villas, penthouses, and apartments." />
    <meta property="og:url" content="https://nestara.in/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nestara Realty — Premium Homes in Pune" />
    <meta name="twitter:description" content="Pune's premier real estate advisory. Find luxury villas, penthouses, and apartments." />

    <!-- Preconnect for images -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Preconnect & Fonts (display=swap for FCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preload hero image for LCP -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1613977257363-707ba9348227?w=1600&q=75" fetchpriority="high" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0F0F0F" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Nestara Realty",
      "description": "Premium real estate advisory in Pune",
      "url": "https://nestara.in",
      "telephone": "+912067890123",
      "email": "hello@nestara.in",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Lane 7, Koregaon Park",
        "addressLocality": "Pune",
        "postalCode": "411001",
        "addressCountry": "IN"
      },
      "areaServed": "Pune",
      "priceRange": "₹₹₹"
    }
    </script>
    <!-- Prevent flash of wrong theme -->
    <script>
      (function(){var t=localStorage.getItem('nestara-theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
